
<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>AI Breakpoint Timeline</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
body{
background:#0A1628;
color:white;
font-family:system-ui,Segoe UI,Roboto;
margin:0;
padding:40px;
}
h1{margin-bottom:6px}
.sub{opacity:.8;margin-bottom:30px}
.card{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:14px;
max-width:1000px;
}
svg text{font-size:13px}
</style>
</head>
<body>

<h1>AI Breakpoint Timeline</h1>
<div class="sub">Moments where capability jumped, not just grew.</div>

<div class="card">
<svg id="chart" width="900" height="200"></svg>
</div>

<script>

const milestones=[{"year": 2012, "label": "Deep Learning Breakthrough (AlexNet)"}, {"year": 2017, "label": "Transformers Introduced"}, {"year": 2020, "label": "GPT\u20113 Demonstrates Scaling"}, {"year": 2022, "label": "ChatGPT Consumer Inflection"}, {"year": 2023, "label": "Multimodal AI Era"}, {"year": 2024, "label": "AI Agents + Tool Use"}]

const svg=d3.select("#chart")

const x=d3.scaleLinear()
.domain([2010,2026])
.range([50,850])

svg.append("line")
.attr("x1",50)
.attr("x2",850)
.attr("y1",100)
.attr("y2",100)
.attr("stroke","white")

svg.selectAll("circle")
.data(milestones)
.enter()
.append("circle")
.attr("cx",d=>x(d.year))
.attr("cy",100)
.attr("r",6)

svg.selectAll("text.year")
.data(milestones)
.enter()
.append("text")
.attr("x",d=>x(d.year))
.attr("y",80)
.attr("text-anchor","middle")
.text(d=>d.year)

svg.selectAll("text.label")
.data(milestones)
.enter()
.append("text")
.attr("x",d=>x(d.year))
.attr("y",130)
.attr("text-anchor","middle")
.text(d=>d.label)

</script>
</body>
</html>
