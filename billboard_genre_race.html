<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billboard Hot 100 – Genre Dominance Race (1958–2025)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--surface:#111827;--border:#1e293b;
  --text:#e2e8f0;--muted:#64748b;--accent:#818cf8;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden}
.noise{position:fixed;inset:0;pointer-events:none;opacity:.03;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
header{padding:32px 40px 0;position:relative;z-index:2}
h1{font-family:'Space Mono',monospace;font-size:clamp(24px,4vw,42px);
  font-weight:700;letter-spacing:-1px;
  background:linear-gradient(135deg,#f0f6fc 0%,#818cf8 50%,#f472b6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.1}
.subtitle{font-size:14px;color:var(--muted);margin-top:6px;font-family:'Space Mono',monospace}
.main{display:grid;grid-template-columns:1fr 320px;gap:24px;
  padding:24px 40px 20px;height:calc(100vh - 120px);min-height:500px}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}}

/* Chart area */
.chart-area{position:relative;background:var(--surface);border-radius:16px;
  border:1px solid var(--border);padding:24px;display:flex;flex-direction:column;
  overflow:hidden}
.chart-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(129,140,248,.3),transparent)}

/* Canvas wrapper gets all remaining space */
.canvas-wrap{flex:1;position:relative;min-height:300px}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}

.date-display{position:absolute;bottom:80px;right:32px;text-align:right;pointer-events:none;z-index:1}
.date-year{font-family:'Space Mono',monospace;font-size:clamp(48px,8vw,96px);
  font-weight:700;color:rgba(255,255,255,.06);line-height:1}
.date-month{font-family:'Space Mono',monospace;font-size:clamp(16px,2vw,24px);
  color:rgba(255,255,255,.15);letter-spacing:2px}
.number-one{position:absolute;top:24px;right:24px;text-align:right;
  background:rgba(0,0,0,.4);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  max-width:280px;z-index:2}
.number-one-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:4px;font-family:'Space Mono',monospace}
.number-one-title{font-size:15px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.number-one-artist{font-size:12px;color:var(--muted);margin-top:2px}

/* Controls */
.controls{display:flex;align-items:center;gap:12px;margin-top:16px;
  padding-top:16px;border-top:1px solid var(--border);flex-shrink:0}
.btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  font-size:14px;flex-shrink:0}
.btn:hover{border-color:var(--accent);background:rgba(129,140,248,.1)}
.btn.active{border-color:var(--accent);background:rgba(129,140,248,.15)}
.timeline{flex:1;position:relative;height:40px;display:flex;align-items:center}
.timeline input[type=range]{width:100%;-webkit-appearance:none;appearance:none;
  background:transparent;cursor:pointer;height:40px}
.timeline input[type=range]::-webkit-slider-runnable-track{height:4px;
  background:var(--border);border-radius:2px}
.timeline input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:16px;height:16px;border-radius:50%;background:var(--accent);
  margin-top:-6px;box-shadow:0 0 12px rgba(129,140,248,.4)}
.timeline input[type=range]::-moz-range-track{height:4px;
  background:var(--border);border-radius:2px}
.timeline input[type=range]::-moz-range-thumb{width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:none}
.speed{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
  min-width:32px;text-align:center;cursor:pointer;user-select:none;flex-shrink:0}
.speed:hover{color:var(--accent)}
.era-markers{display:flex;justify-content:space-between;padding:0 4px;
  margin-top:4px;flex-shrink:0}
.era-marker{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);opacity:.5}

/* Side panel */
.side-panel{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.genre-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;flex-shrink:0}
.genre-card:hover{border-color:rgba(255,255,255,.15);transform:translateX(-2px)}
.genre-card.selected{border-color:rgba(255,255,255,.25)}
.genre-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.genre-name{font-weight:700;font-size:14px;margin-bottom:2px}
.genre-value{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.genre-pct{font-size:12px;color:var(--muted);margin-left:6px}
.genre-rank{position:absolute;top:12px;right:14px;font-family:'Space Mono',monospace;
  font-size:11px;color:var(--muted)}
.genre-songs{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:none}
.genre-card.selected .genre-songs{display:block}
.song-item{font-size:12px;color:var(--muted);padding:2px 0}
.song-item .title{color:var(--text);font-weight:500}
</style>
</head>

// Smooth display values — start at frame 0
let displayValues = {};
D.genres.forEach(g => displayValues[g] = D.cumulative[g][0]);

// Track which genres have appeared (value > 0) — hidden until they emerge
let activeGenres = new Set();
function recalcActiveGenres(upToIdx) {
  activeGenres.clear();
  for (let i = 0; i <= upToIdx; i++) {
    D.genres.forEach(g => { if (D.cumulative[g][i] > 0) activeGenres.add(g); });
  }
}

// ── Helpers ──
function getNumberOne(year, month) {
  const songs = D.numberOnes[String(year)];
  if (!songs) {
    const years = Object.keys(D.numberOnes).map(Number).sort((a,b) => Math.abs(a-year) - Math.abs(b-year));
    const closest = D.numberOnes[String(years[0])];
    return closest[(month-1) % closest.length];
  }
  return songs[(month-1) % songs.length];
}

function roundedRect(ctx, x, y, w, h, r) {
  r = Math.min(r, h/2, w/2);
  if (w <= 0) return;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Canvas sizing ──
let cw = 0, ch = 0;
function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cw = rect.width;
  ch = rect.height;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Draw ──
function drawChart() {
  if (cw === 0 || ch === 0) return;
  ctx.clearRect(0, 0, cw, ch);

  const idx = currentIdx;

  // Smooth interpolation toward targets
  D.genres.forEach(g => {
    const target = D.cumulative[g][idx];
    displayValues[g] = lerp(displayValues[g], target, 0.18);
    // Snap if very close
    if (Math.abs(displayValues[g] - target) < 0.5) displayValues[g] = target;
    // Track genre emergence
    if (D.cumulative[g][idx] > 0) activeGenres.add(g);
  });

  // Sort by display value (ascending so biggest is on top) — only active genres
  const sorted = [...D.genres].filter(g => activeGenres.has(g)).sort((a,b) => displayValues[a] - displayValues[b]);

  const maxVal = Math.max(...D.genres.map(g => displayValues[g]), 1);
  const leftPad = 100;
  const rightPad = 90;
  const topPad = 20;
  const bottomPad = 10;
  const chartW = cw - leftPad - rightPad;
  const availH = ch - topPad - bottomPad;
  const n = sorted.length;
  const gap = Math.max(6, availH * 0.04);
  const barH = Math.max(16, (availH - gap * (n + 1)) / n);

  sorted.forEach((genre, i) => {
    const y = topPad + gap + i * (barH + gap);
    const val = displayValues[genre];
    const barW = Math.max(3, (val / maxVal) * chartW);
    const color = D.colors[genre];
    const isSelected = selectedGenre === genre;
    const dimmed = selectedGenre && !isSelected;

    // Track background
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#fff';
    roundedRect(ctx, leftPad, y, chartW, barH, 5);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Bar
    ctx.globalAlpha = dimmed ? 0.25 : 0.9;
    const grad = ctx.createLinearGradient(leftPad, 0, leftPad + barW, 0);
    grad.addColorStop(0, color + 'aa');
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    roundedRect(ctx, leftPad, y, barW, barH, 5);
    ctx.fill();

    // Glow on selected
    if (isSelected) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 24;
      ctx.globalAlpha = 0.6;
      roundedRect(ctx, leftPad, y, barW, barH, 5);
      ctx.fill();
      ctx.restore();
    }

    ctx.globalAlpha = 1;

    // Genre label (left)
    ctx.fillStyle = dimmed ? 'rgba(255,255,255,.25)' : color;
    ctx.font = `bold ${Math.min(15, barH * 0.45)}px "DM Sans", sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(genre, leftPad - 12, y + barH / 2);

    // Value label (right of bar)
    ctx.fillStyle = dimmed ? 'rgba(255,255,255,.15)' : 'rgba(255,255,255,.65)';
    ctx.font = `bold ${Math.min(13, barH * 0.38)}px "Space Mono", monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(Math.round(val).toLocaleString(), leftPad + barW + 10, y + barH / 2);
  });
}

// ── Side Panel ──
let prevActiveCount = 0;
function buildSidePanel() {
  sidePanel.innerHTML = '';
  D.genres.forEach(genre => {
    if (!activeGenres.has(genre)) return;
    const gid = genre.replace(/[^a-zA-Z]/g,'');
    const card = document.createElement('div');
    card.className = 'genre-card';
    card.innerHTML = `
      <div class="genre-stripe" style="background:${D.colors[genre]}"></div>
      <div class="genre-rank" id="rank-${gid}"></div>
      <div class="genre-name" style="color:${D.colors[genre]}">${genre}</div>
      <div>
        <span class="genre-value" id="val-${gid}" style="color:${D.colors[genre]}">0</span>
        <span class="genre-pct" id="pct-${gid}"></span>
      </div>
      <div class="genre-songs" id="songs-${gid}"></div>
    `;
    card.addEventListener('click', () => {
      if (selectedGenre === genre) {
        selectedGenre = null;
        card.classList.remove('selected');
      } else {
        document.querySelectorAll('.genre-card').forEach(c => c.classList.remove('selected'));
        selectedGenre = genre;
        card.classList.add('selected');
      }
      updateSidePanel();
    });
    sidePanel.appendChild(card);
  });
  prevActiveCount = activeGenres.size;
}

function getGenreInsight(genre, year) {
  const map = {
    'Rock': year<1980?'British Invasion to Arena Rock':'Grunge & alt-rock then legacy decline',
    'Pop': year<2000?'Synth-pop through boy band era':'Streaming-era pop renaissance',
    'R&B': year<1995?'Soul, Motown, New Jack Swing':'R&B-pop crossover dominance',
    'Country': year<2015?'Traditional to country-pop crossover':'Morgan Wallen-era chart surge',
    'Hip-Hop': year<2005?'Golden age to bling era':'Streaming made hip-hop king',
    'Electronic': year<2012?'Early dance-pop & house influence':'EDM boom then genre integration',
    'Latin': year<2017?'Latin Pop Explosion (Ricky Martin era)':'Despacito sparked Latin dominance'
  };
  return map[genre]||'';
}

function updateSidePanel() {
  // Rebuild panel when a new genre appears
  if (activeGenres.size !== prevActiveCount) buildSidePanel();

  const idx = currentIdx;
  const active = D.genres.filter(g => activeGenres.has(g));
  const total = active.reduce((s,g) => s + D.cumulative[g][idx], 0);
  const ranked = [...active].sort((a,b) => D.cumulative[b][idx] - D.cumulative[a][idx]);
  const m = D.months[idx];

  active.forEach(genre => {
    const gid = genre.replace(/[^a-zA-Z]/g,'');
    const val = D.cumulative[genre][idx];
    const pct = total > 0 ? ((val/total)*100).toFixed(1) : '0.0';
    const rank = ranked.indexOf(genre) + 1;

    document.getElementById('val-'+gid).textContent = val.toLocaleString();
    document.getElementById('pct-'+gid).textContent = pct+'%';
    document.getElementById('rank-'+gid).textContent = '#'+rank;

    const songsEl = document.getElementById('songs-'+gid);
    if (selectedGenre === genre) {
      const monthly = D.monthly[genre][idx];
      songsEl.innerHTML = `
        <div class="song-item"><span class="title">${monthly.toFixed(0)} entries</span> this month</div>
        <div class="song-item" style="margin-top:4px;opacity:.7">${getGenreInsight(genre, m.year)}</div>
      `;
    }
  });
}

function updateDisplay() {
  const m = D.months[currentIdx];
  dateMonth.textContent = MONTH_NAMES[m.month - 1].toUpperCase();
  dateYear.textContent = m.year;
  scrubber.value = currentIdx;

  const song = getNumberOne(m.year, m.month);
  n1Title.textContent = '"' + song.title + '"';
  n1Artist.textContent = song.artist;

  updateSidePanel();
}

// ── Animation loop ──
function mainLoop(ts) {
  if (playing) {
    if (!lastTime) lastTime = ts;
    const dt = ts - lastTime;
    const msPerStep = 90 / speed;
    if (dt >= msPerStep) {
      lastTime = ts;
      if (currentIdx < D.months.length - 1) {
        currentIdx++;
        updateDisplay();
      } else {
        playing = false;
        playBtn.innerHTML = '&#9654;';
        playBtn.classList.remove('active');
      }
    }
  }
  drawChart();
  requestAnimationFrame(mainLoop);
}

// ── Controls ──
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9208;' : '&#9654;';
  playBtn.classList.toggle('active', playing);
  if (playing && currentIdx >= D.months.length - 1) {
    currentIdx = 0;
    D.genres.forEach(g => displayValues[g] = 0);
    activeGenres.clear();
    prevActiveCount = 0;
    buildSidePanel();
  }
  lastTime = 0;
});

resetBtn.addEventListener('click', () => {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  playBtn.classList.remove('active');
  currentIdx = 0;
  D.genres.forEach(g => displayValues[g] = 0);
  activeGenres.clear();
  prevActiveCount = 0;
  buildSidePanel();
  updateDisplay();
});

scrubber.addEventListener('input', e => {
  currentIdx = parseInt(e.target.value);
  D.genres.forEach(g => displayValues[g] = D.cumulative[g][currentIdx]);
  recalcActiveGenres(currentIdx);
  buildSidePanel();
  updateDisplay();
});

const speeds = [0.5, 1, 2, 4, 8];
let speedIdx = 1;
speedBtn.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  speed = speeds[speedIdx];
  speedBtn.textContent = speed + '\u00d7';
});

// ── Init ──
recalcActiveGenres(currentIdx);
const ro = new ResizeObserver(() => { resizeCanvas(); });
ro.observe(wrap);
buildSidePanel();
resizeCanvas();
updateDisplay();
requestAnimationFrame(mainLoop);
</script>
</body>
</html>
