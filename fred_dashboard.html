<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRED Economic Dashboard — 1960–2025</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--surface:#0d1220;--surface2:#131a2e;--border:#1a2340;
  --text:#e2e8f0;--muted:#5a6888;--accent:#818cf8;
  --recession:rgba(239,68,68,.07);
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* Grain overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Header */
.header{padding:28px 36px 0;display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
.header h1{font-family:'JetBrains Mono',monospace;font-size:clamp(22px,3.5vw,38px);
  font-weight:700;letter-spacing:-1.5px;line-height:1;
  background:linear-gradient(135deg,#e2e8f0 0%,#818cf8 40%,#22d3ee 70%,#4ade80 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  padding:4px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;
  white-space:nowrap}
.header .source{font-size:12px;color:var(--muted);margin-left:auto;margin-bottom:4px;
  font-family:'JetBrains Mono',monospace}
.header .source a{color:var(--accent);text-decoration:none}

/* Layout */
.dash{display:grid;grid-template-columns:1fr 280px;gap:0;
  padding:20px 36px 16px;height:calc(100vh - 88px);min-height:520px}
@media(max-width:900px){.dash{grid-template-columns:1fr;height:auto;min-height:0}}

/* Chart */
.chart-panel{display:flex;flex-direction:column;background:var(--surface);
  border-radius:14px 0 0 14px;border:1px solid var(--border);overflow:hidden;position:relative}
.chart-header{display:flex;align-items:center;padding:14px 20px;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;
  border-radius:20px;cursor:pointer;border:1px solid transparent;transition:all .2s;
  user-select:none;white-space:nowrap}
.chip.on{border-color:currentColor;opacity:1}
.chip.off{opacity:.3;border-color:var(--border)}
.chip:hover{opacity:.85}
.canvas-wrap{flex:1;position:relative;min-height:200px}
.canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%}

/* Tooltip */
.tooltip{position:absolute;pointer-events:none;background:rgba(13,18,32,.92);
  backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;font-size:12px;z-index:10;min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);transition:opacity .1s;opacity:0}
.tooltip.show{opacity:1}
.tooltip-date{font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:13px;margin-bottom:8px;color:var(--text)}
.tooltip-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.tooltip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tooltip-name{color:var(--muted);flex:1}
.tooltip-val{font-family:'JetBrains Mono',monospace;font-weight:600}
.tooltip-event{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  font-size:11px;color:var(--accent)}

/* Controls */
.controls{display:flex;align-items:center;gap:10px;padding:12px 20px;
  border-top:1px solid var(--border);flex-shrink:0}
.ctrl-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .2s;font-size:13px;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--accent);background:rgba(129,140,248,.08)}
.ctrl-btn.active{border-color:var(--accent);background:rgba(129,140,248,.12)}
.scrub-wrap{flex:1;display:flex;align-items:center}
.scrub-wrap input[type=range]{width:100%;-webkit-appearance:none;appearance:none;
  background:transparent;cursor:pointer;height:36px}
.scrub-wrap input::-webkit-slider-runnable-track{height:3px;background:var(--border);border-radius:2px}
.scrub-wrap input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);margin-top:-5.5px;
  box-shadow:0 0 10px rgba(129,140,248,.35)}
.scrub-wrap input::-moz-range-track{height:3px;background:var(--border);border-radius:2px}
.scrub-wrap input::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:none}
.ctrl-speed{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  cursor:pointer;user-select:none;min-width:28px;text-align:center}
.ctrl-speed:hover{color:var(--accent)}
.ctrl-date{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  color:var(--text);min-width:80px;text-align:right;flex-shrink:0}

/* Side panel */
.side-panel{background:var(--surface);border-radius:0 14px 14px 0;
  border:1px solid var(--border);border-left:none;overflow-y:auto;
  display:flex;flex-direction:column}
@media(max-width:900px){.side-panel{border-radius:0 0 14px 14px;border-left:1px solid var(--border);border-top:none}}

.side-section{padding:16px;border-bottom:1px solid var(--border)}
.side-section:last-child{border-bottom:none}
.side-label{font-family:'JetBrains Mono',monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.stat-card{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.stat-card:last-child{border-bottom:none}
.stat-name{font-size:12px;color:var(--muted);margin-bottom:2px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.stat-desc{font-size:11px;color:var(--muted);margin-top:2px;opacity:.7}
.stat-fred{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
  opacity:.4;margin-top:2px}

/* Event list */
.event-item{padding:6px 0;font-size:12px;display:flex;gap:8px;align-items:baseline}
.event-year{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:32px}
.event-text{color:var(--text);font-weight:500}
.event-item.active .event-text{color:var(--accent)}
</style>
</head>

<div class="header">
  <h1>FRED Economic Pulse</h1>
  <span class="tag">1960 – 2025</span>
  <span class="source">Data: <a href="https://fred.stlouisfed.org" target="_blank">FRED St. Louis</a></span>
</div>

<div class="dash">

    <div class="chart-header" id="chipBar"></div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="chart"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="playBtn">&#9654;</button>
      <button class="ctrl-btn" id="resetBtn">&#9198;</button>
      <div class="scrub-wrap">
        <input type="range" id="scrubber" min="0" max="791" value="791">
      </div>
      <div class="ctrl-speed" id="speedBtn">1&times;</div>
      <div class="ctrl-date" id="dateLabel">Dec 2025</div>
    </div>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="side-section">
      <div class="side-label">Current Values</div>
      <div id="statCards"></div>
    </div>
    <div class="side-section">
      <div class="side-label">Key Events</div>
      <div id="eventList"></div>
    </div>
  </div>
</div>

const KEYS = Object.keys(D.series);
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── State ──
let visibleSeries = new Set(KEYS.filter(k => k !== 'sp500')); // S&P off by default (different scale)
let currentIdx = D.months.length - 1;
let playing = false;
let speed = 1;
let lastTime = 0;
let hoverIdx = -1;

// ── DOM ──
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const tooltipEl = document.getElementById('tooltip');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const scrubber = document.getElementById('scrubber');
const speedBtn = document.getElementById('speedBtn');
const dateLabel = document.getElementById('dateLabel');
const chipBar = document.getElementById('chipBar');
const statCards = document.getElementById('statCards');
const eventList = document.getElementById('eventList');

let cw = 0, ch = 0, dpr = 1;
const PAD = { top: 24, right: 20, bottom: 30, left: 56 };
// Extra right padding when S&P axis is visible
function getRightPad() { return visibleSeries.has('sp500') ? 62 : 20; }

// ── Canvas sizing ──
function resize() {
  const r = wrap.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  cw = r.width; ch = r.height;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
new ResizeObserver(resize).observe(wrap);

// ── Build UI ──
function buildChips() {
  chipBar.innerHTML = '';
  KEYS.forEach(k => {
    const s = D.series[k];
    const chip = document.createElement('span');
    chip.className = 'chip ' + (visibleSeries.has(k) ? 'on' : 'off');
    chip.style.color = s.color;
    chip.textContent = s.short;
    chip.addEventListener('click', () => {
      if (visibleSeries.has(k)) visibleSeries.delete(k);
      else visibleSeries.add(k);
      chip.className = 'chip ' + (visibleSeries.has(k) ? 'on' : 'off');
    });
    chipBar.appendChild(chip);
  });
}

function buildStats() {
  statCards.innerHTML = '';
  KEYS.forEach(k => {
    const s = D.series[k];
    const div = document.createElement('div');
    div.className = 'stat-card';
    div.id = 'stat-' + k;
    div.innerHTML = `
      <div class="stat-name" style="color:${s.color}">${s.short}</div>
      <div class="stat-val" style="color:${s.color}" id="sv-${k}">—</div>
      <div class="stat-fred">FRED: ${s.fred_id}</div>
    `;
    statCards.appendChild(div);
  });
}

function buildEvents() {
  eventList.innerHTML = '';
  D.events.forEach((ev, i) => {
    const div = document.createElement('div');
    div.className = 'event-item';
    div.id = 'ev-' + i;
    div.innerHTML = `<span class="event-year">${ev.year}</span><span class="event-text">${ev.label}</span>`;
    div.style.cursor = 'pointer';
    div.addEventListener('click', () => {
      // Jump to that event
      const idx = D.months.findIndex(m => m.year === ev.year && m.month === ev.month);
      if (idx >= 0) { currentIdx = idx; scrubber.value = idx; updateUI(); }
    });
    eventList.appendChild(div);
  });
}

// ── Drawing ──
function monthToIdx(ym) {
  const [y, m] = ym.split('-').map(Number);
  return D.months.findIndex(d => d.year === y && d.month === m);
}

function xForIdx(i, plotW) {
  return PAD.left + (i / (D.months.length - 1)) * plotW;
}

function drawChart() {
  if (cw === 0 || ch === 0) return;
  ctx.clearRect(0, 0, cw, ch);
  const rp = getRightPad();
  const plotW = cw - PAD.left - rp;
  const plotH = ch - PAD.top - PAD.bottom;

  // ── Recession shading ──
  D.recessions.forEach(rec => {
    const si = monthToIdx(rec.start);
    const ei = monthToIdx(rec.end);
    if (si < 0 || ei < 0) return;
    const x1 = xForIdx(si, plotW);
    const x2 = xForIdx(ei, plotW);
    ctx.fillStyle = var_recession;
    ctx.fillRect(x1, PAD.top, x2 - x1, plotH);
  });

  // ── Compute Y ranges ──
  // "Rate" axis (left): all % series
  // "SP500" axis (right): if visible
  const rateKeys = [...visibleSeries].filter(k => k !== 'sp500');
  const showSP = visibleSeries.has('sp500');

  let rMin = Infinity, rMax = -Infinity;
  rateKeys.forEach(k => {
    const slice = D.series[k].data.slice(0, currentIdx + 1);
    rMin = Math.min(rMin, ...slice);
    rMax = Math.max(rMax, ...slice);
  });
  if (rMin === Infinity) { rMin = 0; rMax = 10; }
  const rPad = (rMax - rMin) * 0.1 || 1;
  rMin -= rPad; rMax += rPad;

  let spMin = 0, spMax = 6000;
  if (showSP) {
    const spSlice = D.series.sp500.data.slice(0, currentIdx + 1);
    spMin = Math.min(...spSlice) * 0.9;
    spMax = Math.max(...spSlice) * 1.1;
  }

  function yRate(v) { return PAD.top + plotH - ((v - rMin) / (rMax - rMin)) * plotH; }
  function ySP(v) { return PAD.top + plotH - ((v - spMin) / (spMax - spMin)) * plotH; }

  // ── Grid lines ──
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  const nGrid = 6;
  for (let i = 0; i <= nGrid; i++) {
    const y = PAD.top + (plotH / nGrid) * i;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + plotW, y); ctx.stroke();
  }

  // ── Y axis labels (left — rate) ──
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= nGrid; i++) {
    const v = rMin + ((rMax - rMin) / nGrid) * (nGrid - i);
    const y = PAD.top + (plotH / nGrid) * i;
    ctx.fillText(v.toFixed(1) + '%', PAD.left - 8, y);
  }

  // ── Y axis labels (right — S&P) ──
  if (showSP) {
    ctx.fillStyle = D.series.sp500.color + '55';
    ctx.textAlign = 'left';
    for (let i = 0; i <= nGrid; i++) {
      const v = spMin + ((spMax - spMin) / nGrid) * (nGrid - i);
      const y = PAD.top + (plotH / nGrid) * i;
      ctx.fillText(Math.round(v).toLocaleString(), PAD.left + plotW + 8, y);
    }
  }

  // ── X axis labels ──
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const decades = [1960,1970,1980,1990,2000,2010,2020,2025];
  decades.forEach(yr => {
    const i = D.months.findIndex(m => m.year === yr && m.month === 1);
    if (i < 0) return;
    const x = xForIdx(i, plotW);
    ctx.fillText(yr, x, ch - PAD.bottom + 8);
  });

  // ── Zero line if rates go negative ──
  if (rMin < 0 && rMax > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(PAD.left, yRate(0));
    ctx.lineTo(PAD.left + plotW, yRate(0));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Draw series ──
  const drawOrder = [...rateKeys];
  if (showSP) drawOrder.unshift('sp500'); // draw S&P first (behind)

  drawOrder.forEach(k => {
    const s = D.series[k];
    const isSP = k === 'sp500';
    const yFn = isSP ? ySP : yRate;
    const data = s.data;

    // Area fill
    ctx.beginPath();
    ctx.moveTo(xForIdx(0, plotW), yFn(data[0]));
    for (let i = 1; i <= currentIdx; i++) {
      ctx.lineTo(xForIdx(i, plotW), yFn(data[i]));
    }
    ctx.lineTo(xForIdx(currentIdx, plotW), PAD.top + plotH);
    ctx.lineTo(xForIdx(0, plotW), PAD.top + plotH);
    ctx.closePath();
    const areaGrad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + plotH);
    areaGrad.addColorStop(0, s.color + '18');
    areaGrad.addColorStop(1, s.color + '02');
    ctx.fillStyle = areaGrad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(xForIdx(0, plotW), yFn(data[0]));
    for (let i = 1; i <= currentIdx; i++) {
      ctx.lineTo(xForIdx(i, plotW), yFn(data[i]));
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = isSP ? 1.5 : 2;
    ctx.globalAlpha = isSP ? 0.6 : 0.85;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // End dot
    const endX = xForIdx(currentIdx, plotW);
    const endY = yFn(data[currentIdx]);
    ctx.beginPath();
    ctx.arc(endX, endY, 4, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
  });

  // ── Event markers ──
  D.events.forEach(ev => {
    const i = D.months.findIndex(m => m.year === ev.year && m.month === ev.month);
    if (i < 0 || i > currentIdx) return;
    const x = xForIdx(i, plotW);
    ctx.strokeStyle = 'rgba(129,140,248,.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + plotH); ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── Hover crosshair ──
  if (hoverIdx >= 0 && hoverIdx <= currentIdx) {
    const x = xForIdx(hoverIdx, plotW);
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + plotH); ctx.stroke();

    // Dots on each visible series
    [...visibleSeries].forEach(k => {
      const s = D.series[k];
      const yFn = k === 'sp500' ? ySP : yRate;
      const y = yFn(s.data[hoverIdx]);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      ctx.strokeStyle = var_bg;
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }
}
const var_recession = 'rgba(239,68,68,.06)';
const var_bg = '#06080f';

// ── Tooltip ──
function showTooltip(idx, mx, my) {
  const m = D.months[idx];
  let html = `<div class="tooltip-date">${MONTHS[m.month-1]} ${m.year}</div>`;
  [...visibleSeries].forEach(k => {
    const s = D.series[k];
    const v = s.data[idx];
    const fmt = k === 'sp500' ? Math.round(v).toLocaleString() : v.toFixed(2) + '%';
    html += `<div class="tooltip-row">
      <span class="tooltip-dot" style="background:${s.color}"></span>
      <span class="tooltip-name">${s.short}</span>
      <span class="tooltip-val" style="color:${s.color}">${fmt}</span>
    </div>`;
  });
  // Check for nearby event
  const ev = D.events.find(e => {
    const ei = D.months.findIndex(mm => mm.year===e.year && mm.month===e.month);
    return Math.abs(ei - idx) < 3;
  });
  if (ev) html += `<div class="tooltip-event">${ev.label}</div>`;

  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('show');

  // Position
  const tw = tooltipEl.offsetWidth;
  const th = tooltipEl.offsetHeight;
  let tx = mx + 16, ty = my - th / 2;
  if (tx + tw > cw - 10) tx = mx - tw - 16;
  if (ty < 4) ty = 4;
  if (ty + th > ch - 4) ty = ch - th - 4;
  tooltipEl.style.left = tx + 'px';
  tooltipEl.style.top = ty + 'px';
}

// ── Mouse ──
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const rp = getRightPad();
  const plotW = cw - PAD.left - rp;

  if (mx < PAD.left || mx > PAD.left + plotW) {
    hoverIdx = -1;
    tooltipEl.classList.remove('show');
    return;
  }
  const frac = (mx - PAD.left) / plotW;
  const idx = Math.round(frac * (D.months.length - 1));
  if (idx > currentIdx || idx < 0) { hoverIdx = -1; tooltipEl.classList.remove('show'); return; }
  hoverIdx = idx;
  showTooltip(idx, mx, my);
});
canvas.addEventListener('mouseleave', () => {
  hoverIdx = -1;
  tooltipEl.classList.remove('show');
});

// ── Update UI ──
function updateUI() {
  const m = D.months[currentIdx];
  dateLabel.textContent = MONTHS[m.month-1] + ' ' + m.year;
  scrubber.value = currentIdx;

  // Stats
  KEYS.forEach(k => {
    const v = D.series[k].data[currentIdx];
    const el = document.getElementById('sv-' + k);
    if (el) {
      el.textContent = k === 'sp500' ? Math.round(v).toLocaleString() : v.toFixed(2) + '%';
    }
  });

  // Highlight nearest event
  D.events.forEach((ev, i) => {
    const el = document.getElementById('ev-' + i);
    const ei = D.months.findIndex(mm => mm.year === ev.year && mm.month === ev.month);
    el.className = 'event-item' + (Math.abs(ei - currentIdx) < 6 ? ' active' : '');
  });
}

// ── Animation ──
function mainLoop(ts) {
  if (playing) {
    if (!lastTime) lastTime = ts;
    if (ts - lastTime >= 60 / speed) {
      lastTime = ts;
      if (currentIdx < D.months.length - 1) {
        currentIdx++;
        updateUI();
      } else {
        playing = false;
        playBtn.innerHTML = '&#9654;';
      }
    }
  }
  drawChart();
  requestAnimationFrame(mainLoop);
}

// ── Controls ──
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9208;' : '&#9654;';
  playBtn.classList.toggle('active', playing);
  if (playing && currentIdx >= D.months.length - 1) currentIdx = 0;
  lastTime = 0;
});
resetBtn.addEventListener('click', () => {
  playing = false; playBtn.innerHTML = '&#9654;'; playBtn.classList.remove('active');
  currentIdx = 0; updateUI();
});
scrubber.addEventListener('input', e => { currentIdx = parseInt(e.target.value); updateUI(); });
const speeds = [0.5, 1, 2, 4, 8];
let spdIdx = 1;
speedBtn.addEventListener('click', () => {
  spdIdx = (spdIdx + 1) % speeds.length;
  speed = speeds[spdIdx];
  speedBtn.textContent = speed + '\u00d7';
});

// ── Init ──
resize();
buildChips();
buildStats();
buildEvents();
updateUI();
requestAnimationFrame(mainLoop);
</script>
